# Knight Mod Common Configuration
# This file contains client and server shared settings

[Knight Settings]
	#Probability of knights spawning (0.0 to 1.0)
	#Range: 0.0 ~ 1.0
	knightSpawnProbability = 0.1

	#Probability of knights holding weapons (0.0 to 1.0)
	#Range: 0.0 ~ 1.0
	knightWeaponProbability = 0.7

	#Base health of knights
	#Range: 1 ~ 1000
	knightHealth = 30

	#Base damage of knights
	#Range: 1 ~ 100
	knightDamage = 8

	#Enable custom entities spawning
	enableCustomEntities = true

	#Enable custom weapons
	enableCustomWeapons = true
