# This is an example mods.toml file. It contains the metadata about your mod.
# There should be exactly one mods.toml file per mod.
#
# See https://docs.minecraftforge.net/en/1.20.x/gettingstarted/mods.toml for more information about the format and all possible entries.
#
# Note: If you use the generator, this file will be overwritten, so make sure to save your changes before running the generator.
#
modLoader="javafml"
loaderVersion="[47,)"
license="${mod_license}"
issueTrackerURL="https://github.com/examplemod/issues"
logoFile="logo.png"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
displayURL="https://account.bilibili.com/account/home?spm_id_from=333.1007.0.0"
authors="${mod_authors}"
description='''
${mod_description}
'''

[[dependencies.${mod_id}]]
    modId="minecraft"
    mandatory=true
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="forge"
    mandatory=true
    versionRange="${forge_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="create"
    mandatory=false
    versionRange="[6.0.0,)"
    ordering="AFTER"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="createutilities"
    mandatory=false
    versionRange="[0.3.0,)"
    ordering="AFTER"
    side="BOTH"
